name: Daily Car Content Digest

on:
  schedule:
    # 每天北京时间 8:00 运行（UTC 0:00）
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  generate-and-deliver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run complete pipeline
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_BASE_URL: ${{ secrets.CLAUDE_BASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "🚗 Starting Car Content Curator Pipeline"
          echo "========================================"

          echo ""
          echo "📡 Module 1: Generate Feed"
          npm run feed || echo "⚠️ Module 1 failed, continuing..."

          echo ""
          echo "📦 Module 2: Cluster Topics"
          npm run cluster || echo "⚠️ Module 2 failed, continuing..."

          echo ""
          echo "🏆 Module 3: Rank Topics"
          npm run rank || echo "⚠️ Module 3 failed, continuing..."

          echo ""
          echo "📝 Module 4: Write Articles"
          npm run write || echo "⚠️ Module 4 failed, continuing..."

          echo ""
          echo "📤 Module 5: Deliver to Telegram"
          npm run deliver || echo "⚠️ Module 5 failed"

          echo ""
          echo "✅ Pipeline completed"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-content-${{ github.run_number }}
          path: |
            data/feeds/*.json
            data/clustered/*.json
            data/ranked/*.json
            data/articles/*.json
          retention-days: 7

      - name: Commit and push generated data
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-generated content $(date +'%Y-%m-%d')" && git push)
