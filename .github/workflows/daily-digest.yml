name: Daily Car Content Digest

on:
  schedule:
    # 每天北京时间 8:00 运行（UTC 0:00）
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      module:
        description: '要运行的模块'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - feed
          - cluster
          - rank
          - write
          - deliver

permissions:
  contents: write

jobs:
  generate-and-deliver:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      RUN_TIMEZONE: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip3 install requests

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Validate Telegram secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          test -n "$TELEGRAM_BOT_TOKEN" || (echo "❌ Missing TELEGRAM_BOT_TOKEN" && exit 1)
          test -n "$TELEGRAM_CHAT_ID" || (echo "❌ Missing TELEGRAM_CHAT_ID" && exit 1)

      - name: Run car-content skill
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_BASE_URL: ${{ secrets.CLAUDE_BASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SKILL_MODULE: ${{ github.event.inputs.module }}
        run: |
          set -euo pipefail
          MODULE="${SKILL_MODULE:-all}"

          echo "🚗 Starting Car Content Curator Skill"
          echo "===================================="
          echo "Module: ${MODULE}"

          chmod +x ./.claude/skills/car-content-producer/run.sh
          ./.claude/skills/car-content-producer/run.sh "${MODULE}"

          echo ""
          echo "✅ Skill completed"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-content-${{ github.run_number }}
          path: |
            data/feeds/*.json
            data/clustered/*.json
            data/ranked/*.json
            data/articles/*.json
            state/state-feed.json
          retention-days: 7

      - name: Commit and push generated data
        if: success()
        continue-on-error: true
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git add -f state/state-feed.json || true
          if git diff --quiet && git diff --staged --quiet; then
            echo "ℹ️ No generated data changes to commit"
          else
            git commit -m "🤖 Auto-generated content $(date +'%Y-%m-%d')"
            git pull --rebase origin main || echo "⚠️ Rebase skipped"
            git push || echo "⚠️ Push skipped"
          fi
